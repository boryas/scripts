# Per-test operator metadata.
#
# This file replaces the historical split of:
#   - PARA_SKIP          (which tests to skip in the parallel phase)
#   - PERSISTENT_HANGS   (which tests to skip entirely)
#   - SLOW_TESTS         (which tests to dispatch first)
#   - KNOWN_FAILURES.yaml (investigation notes for failures)
#
# Tests not listed here have no operator metadata; their runtime stats
# are still captured per-run in history.json.
#
# Schema (all fields optional, mix-and-match):
#
#   slow: true
#       Promote to slow-first dispatch.  Just an ordering hint; no
#       effect on whether the test runs.
#
#   schedule: persistent_hang
#       Skip this test entirely.  test/run synthesizes a parallel-phase
#       timeout entry; digest verdicts as "timeout" via the no-attempt
#       fallback.  Saves the wall-clock cost of running tests we know
#       won't complete.
#       (absent => normal dispatch)
#
#   timeout_budget: <humantime>
#       Operator override for the per-test timeout (e.g. "30m").  When
#       absent, the budget is derived from history.json:
#         max(non-timeout dur over last ~10 runs) * 1.5, clamped to
#         [60s, 30m].
#       Fallback when no history exists: 8m.
#
#   category: <bucket>
#       Investigation taxonomy.  html/run groups failures on the web UI
#       by this field.  Free-form-ish; current values:
#         enospc-fragility, dm-suspected-real, tooling-skew,
#         env-fixed-pending-verify
#
#   status: <state>
#       Investigation state.  Current values:
#         known-test-bug, needs-upstream-check, fixed-pending-verify,
#         tooling-skew
#
#   explanation: |
#       Multi-line, what's known about the failure mode.
#
#   investigated: YYYY-MM-DD
#       Last review date.
#
#   bug: <url-or-id>   (optional)
#
# Workflow notes:
#
# * Set timeout_budget when a test reliably exceeds the auto-derived
#   value (the derivation can't tell "test capped at 8m" from "test
#   completed in 8m", so once a test starts timing out, encode the
#   real budget here until enough non-timeout history accumulates).
# * Promote to schedule: persistent_hang after 2+ consecutive 30m+
#   timeouts (the test isn't worth waiting on).
# * Add a category/status entry after 3+ consecutive failures with the
#   same root cause.  Demote (delete or status: fixed-pending-verify)
#   once the underlying issue is resolved.

# ---------------------------------------------------------------------------
# Tests that take >30m -- routed to the slow_tail dispatch pool so they
# don't gate the wall-clock of the regular pool's results.  The split
# threshold is "budget > 30m" so the operator override below is what
# actually determines pool placement.
# ---------------------------------------------------------------------------

btrfs/187:
  slow: true
  # ~95 minutes observed on a fast droplet; 2h gives margin for slower ones.
  timeout_budget: 2h

# generic/166: previously thought to hang, passed in 14min on a fast
# droplet.  Give it 30m so it lands in the *regular* pool (budget <=
# 30m); after a few real-history runs the derivation should pin it
# closer to 28m on its own and the override can be removed.
generic/166:
  slow: true
  timeout_budget: 30m

