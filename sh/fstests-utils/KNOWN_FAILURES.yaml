# Investigation state for tests that fail persistently on our fstests
# setup.  html/run reads this file and:
#   - drops listed tests from the headline fail/hang counts on the per-run page
#   - renders a "known failures" bucket grouped by `category`
#   - if a listed test's current-run verdict is pass-equivalent, the entry is
#     flagged as a transition (auto-promote-to-fixed candidate)
#
# Add a test here after >= 3 consecutive cloud failures with the same root
# cause.  Remove (or move status -> fixed-upstream) once the underlying
# issue is resolved.
#
# Schema:
#   test:         <group>/<num>
#   category:     enospc-fragility | dm-suspected-real | tooling-skew |
#                 env-fixed-pending-verify
#   status:       known-test-bug | needs-upstream-check |
#                 fixed-pending-verify | tooling-skew
#   explanation:  multi-line, what's known about the failure mode
#   investigated: YYYY-MM-DD when last looked at
#   refs:         optional list of {commit, upstream, run} pointers

# ---------------------------------------------------------------------------
# Fixed locally, awaiting first passing run to confirm and demote.
# ---------------------------------------------------------------------------

- test: btrfs/058
  category: env-fixed-pending-verify
  status: fixed-pending-verify
  explanation: |
    Test invokes terminfo-aware tools; ssh BatchMode left TERM unset
    so they emitted "No entry for terminal type 'unknown'..." into
    the test's stdout, breaking the golden-output match.  Fix landed
    in para-fstests/ssh-one.sh: TERM=dumb prepended to the sudo
    invocation.  Should pass on the next nightly; demote once stable.
  investigated: 2026-05-18

# ---------------------------------------------------------------------------
# ENOSPC family (11) -- tests reformat scratch to a small filesystem
# (256MiB to 2GiB) and assume xfs/ext4-style space accounting.  At those
# sizes btrfs metadata overhead is 20-40% of the fs, so ENOSPC fires at
# the wrong point relative to the test's expectations.  Reproduced
# identically on cloud + cloud-rerun + v0.  Not a kernel bug; tests
# need btrfs-aware adjustments upstream.
# ---------------------------------------------------------------------------

- test: btrfs/170
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    2GiB scratch; `btrfs subvolume snapshot` fails ENOSPC because
    metadata overhead consumes most of the small fs.
  investigated: 2026-05-18

- test: generic/015
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    256MiB scratch; expects ~246MB free after delete, observes 0.
    Btrfs reserves metadata space that isn't freed by file delete --
    a known small-fs accounting discrepancy with the test's xfs/ext4
    assumptions.
  investigated: 2026-05-18

- test: generic/171
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    320MiB scratch; expects CoW-after-fill to ENOSPC; btrfs allocator
    chunk-reuse gives extra headroom and the CoW succeeds.
  investigated: 2026-05-18

- test: generic/172
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    1GiB scratch; mkdir of test workdir fails ENOSPC at start because
    metadata already consumed the small fs's budget.
  investigated: 2026-05-18

- test: generic/173
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    320MiB scratch; mmap CoW expected SIGBUS on ENOSPC, got clean exit
    (writes succeeded because btrfs headroom differed from test's
    fill calculation).
  investigated: 2026-05-18

- test: generic/174
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    Same shape as generic/171 at 320MiB; CoW-after-fill succeeds when
    the test expects ENOSPC.
  investigated: 2026-05-18

- test: generic/274
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    2GiB preallocation test; first write fails ENOSPC because btrfs
    metadata reservations consumed the fs upfront.
  investigated: 2026-05-18

- test: generic/427
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    256MiB scratch; `open: No space left on device` at the start --
    fs is effectively full before the test does anything.
  investigated: 2026-05-18

- test: generic/511
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    Small fs; `touch` fails ENOSPC immediately at test start.
  investigated: 2026-05-18

- test: generic/546
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    Small fs; `XFS_IOC_CLONE_RANGE: No space left on device` during
    a clone operation that the test assumes will succeed.
  investigated: 2026-05-18

- test: generic/747
  category: enospc-fragility
  status: known-test-bug
  explanation: |
    8GiB scratch; mixed write/delete fillup hits ENOSPC during the
    direct-IO phase when test expects to still have headroom.
  investigated: 2026-05-18

# ---------------------------------------------------------------------------
# DM-group (4) -- all use device-mapper targets (dm-error or dm-thin
# + dm-log-writes) and test specific kernel-side semantics: fsync error
# clearing, FUA write emission on log-root updates, log-replay file
# reconstruction.  Fail on both cloud and v0 with same kernel.  These
# look more like real kernel issues than test fragility, but I haven't
# tested against a non-for-next btrfs base to confirm.  Needs upstream
# check or bisect to know if they're regressions vs longstanding.
# ---------------------------------------------------------------------------

- test: btrfs/146
  category: dm-suspected-real
  status: needs-upstream-check
  explanation: |
    Tests fsync error-state recovery via dm-error toggle.  After the
    device transitions error -> OK, the test's third fsync still
    returns EIO instead of 0.  Could be a btrfs fsync error-clearing
    regression, or longstanding behavior the test never matched.
  investigated: 2026-05-18

- test: btrfs/196
  category: dm-suspected-real
  status: needs-upstream-check
  explanation: |
    Multi-subvolume fsync test using dm-log-writes to capture FUA
    writes against the log root.  Test fails with "failed to locate
    next FUA write" -- no FUA-flagged write found where the original
    fix (btrfs: fix incorrect updating of log root tree) was supposed
    to emit one.  Possible regression in log-root FUA emission.
  investigated: 2026-05-18

- test: generic/455
  category: dm-suspected-real
  status: needs-upstream-check
  explanation: |
    Crash-recovery test via fsx + dm-log-writes replay.  After replay
    to a marked point, testfile0 is *missing* (No such file or
    directory) -- not corrupted, gone entirely.  Suggests btrfs log
    replay isn't reconstructing the file when it should.
  investigated: 2026-05-18

- test: generic/457
  category: dm-suspected-real
  status: needs-upstream-check
  explanation: |
    Same shape as generic/455 but with reflinked test files.
    testfile1 missing after dm-log-writes replay.
  investigated: 2026-05-18

# ---------------------------------------------------------------------------
# Tooling skew (2) -- cloud worker's snapshot has older fstests checkout
# and/or newer distro btrfs-progs vs v0's custom build.  Not kernel bugs.
# Fix: rebuild snapshot with current fstests + matching btrfs-progs.
# ---------------------------------------------------------------------------

- test: btrfs/218
  category: tooling-skew
  status: tooling-skew
  explanation: |
    Cloud's btrfs-progs (v6.17, distro) emits "found more devices than
    fs_info" informational warning; test golden doesn't expect it.
    v0's custom older btrfs-progs predates the message and passes.
    Confirmed via `strings /usr/bin/btrfs`.  Fix: rebuild cloud snapshot
    with matching btrfs-progs, or contribute an fstests golden update.
  investigated: 2026-05-18

- test: generic/301
  category: tooling-skew
  status: tooling-skew
  explanation: |
    Cloud's fstests checkout predates a commit that adds a btrfs guard
    around the 2/3-of-blocks fragmentation threshold (designed for XFS
    cowextsize).  Same extent counts on cloud (1500-1700) and v0
    loop-on-ext4 (1611-1690); v0 passes only because its fstests has
    the guard.  Fix: refresh cloud snapshot's fstests checkout.
  investigated: 2026-05-18
